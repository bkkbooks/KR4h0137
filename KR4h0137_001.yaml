body:
  text: 二家宫詞巻上明毛晉編宋徽宗春朝小雨乍新晴祥靄勻收洞宇明嚴警不聞人一語海棠枝上曉鶯聲塗舟輝映霽霞明四啓嚴聞曉漏清初御廣寒人意肅九宫遥聽警鞭聲寒一作庭御溝春水緑濺濺曲沼廻波四接連環碧下臨方鑑浄遊魚跳躍浪痕圓白檀象戯小盤平牙子金書字更明夜静綺忩輝絳蠟玉容相對煖移聲宣和庭廡四廻環書畫金籯兩掖間韜袐緘扃飛寶構鼎新文供稱幽閒春工先與上林芳迎嵗紅梅破臘香才過閣門分曲檻弄晴繁蘂麗如糚玉宇珍庭夜未央月移花影上廻廊精神勤禱祗民福耿耿晴空靄露香羲獻眞蹤勝古初摉求方得到皇居退朝彛鼎然沈水因染霜毫更學書太皇生日最尊嚴獻夀宫中未五更天子捧觴仍再拜寶慈侍立到天明嘉禾呈瑞已為殊更有靈芝拱翠趺通進剡章知異物飜傳繪畫作新圖麟隄千尺盡塗丹文瓦雕甍敞殿寛折檻盡循前古制當中一曲不安欄盡一作俱雲臺呈瑞出坤珍龍角層芝五色新從此九莖何足尚圖書麟閣永無倫秦娥從小學宫韶竊愛仙音逸韻飄應慕鳳臺吹紫玉夜闌時按白牙簫或刻王禹玉元宵三五競芳年十二都門沸管絃鼇負繒山輝絳閣龍銜寶炬撒金蓮拂隄緑栁弄春柔盈沼沈波瑩鴨頭錦繡成叢飛畫檝輕舠兩兩翼龍舟沈一作澄雲巖小石碧嶙峋瑩徹仍移玉座親千仭喬崧雖突秀未如纖巧具天真梨花如雪照庭隅魄月淪精上海初禁鼓方傳宫漏閉嬪嬙相拉夜看書翠芳庭宇疊山圍路轉龍盤燦陸離響石因風飄冷韻小碑刋勒祖宗詩平明綵仗幸琳宫紫府仙童下九重整頓瓏璁時駐馬畫工暗地貌真容或刻王紳承平皇族益繁昌雁序天倫令徳彰此意綿長敦友愛時時别殿宴親王銷金花朶遍輕羅剪作春衣賜下多鬬薄只貪腰細栁夜闌無奈峭寒何求賢取士屬熈辰朝野喧傳詔墨新省試更増人百數大庭將見出平津宮嬪餘樂稱幽閒不喜濃糚鬬媚顔浣罷竹風蠲濁慮一輪明月照屏山碧紗牕薄晃朝曦睡起心情不自持糚飾尚慵臨曲檻却敎鸚鵡念新詩緑攪蘭芽繞徑隅日融花氣暖縈紆鞦韆伴侶時相約畫板繒繩翠袖扶雅頌形容各訓箋后妃基化國風先巻分二十求深㫖親著全經正論篇深庭窗月透輕紗仙侣勤工組繡華笑語竟將心事卜只知相顧看燈花崇政西清闢講筵簪裾雜遝盡英賢守成當謹持盈戒紬繹鳬鷖大雅篇後宫宫女無多少盡向園中笑一團舞蝶落花相覔看春風共語亦應難沉水薫濃瑞靄飛相兼花氣馥庭墀皇家休問多嘉景絳闕清都只此知玉容初起殢春慵鬢軃秋蟬不解攏十二寶闌閒倚處花間應避落殘紅嬌雲溶漾作春晴繡轂清風出鳳城簾底紅糚方笑語通衢争聴賣花聲紅旗連屬曉熒煌萬馬嘶風去路長知是黠羌來欵塞親臨丹闕納降王綺堂嬪御坦春容蹔止連綿組繡功却取詩書共披閱終朝歌演二南風三月風光觸處奇禁宫通夜足娱嬉踏青鬬草皆餘事閒集朋儕静奕棋燧人鑽火應時分頒賜諸宫處處聞堂上美人無用處旋燔金餅炷蘭薰處處一作盡樂鬬雞園裏誠非雅射鴨池邊豈足多最好芰荷香隔岸畫船揺曵按笙歌六幕低垂曉鑑寒簾旌風動皺翔鸞仙姿糚早呵纎指遠黛遥分勝筆端翡翠盤龍裝繡額真珠雙鳯蹙花毬時聞玉女牽簾笑箭躍銅壺不算籌雙陸飜騰品格新屢贏由彩豈由人坐中時有全嬌態才見頻輸特地嗔緑徑平平擺地尖花毬亭下總相兼時來奮撃争多勝格令輸贏不畏嚴齊警開塲設鼓鉦雷霆凛凛奏嚴聲通宵環衛無譁語惟聴雞人巧唱更皇家詵偉固藩垣濮邸尤為席慶源八寶霈恩陞殿服朝班榮盛子孫繁猶豫瓊林與俗同森嚴羽衛躍花驄旌旗射日飄紅浪歸處香塵拂晩風翠色青濃自不堪敲氷柔葉兩相㕘宫人因出方傳法迄後民間識内藍瑶林新覩玉為墀瑞竹雙擎待鳳枝共本分岐駢粉節龜趺御製有新詩珊瑚植立壯林巒翡翠巑岏作小灘几案自成清曠景蓬山常對座隅看早臨書殿啓芸香氷硯難開肅曉霜初製暖爐新様巧雲龍突鏤遍金箱書一作武韶光婉媚屬清明敞宴斯辰到穆清近宻被宣争蹴踘兩朋庭際角輸贏金殿重重十字方當中鸞鶴勢翺翔韜藏蘭炷無人見篆縷揺揺闔座香秋來簾幕捲輕風一夜濃隂蔽逺空燕館乍凉人不寐更聴踈雨滴梧桐朝班翼翼布鴛行三衛森嚴殿砌旁遴選親勲先許進較員多是補中郎水晶新製寶巵成氷潔無瑕瑩玉明醉捧纖纖飛大白嫦娥端望月輪平宗祀𤣥堂羽衛還大庭齋夕駐鳴鸞平明復賜端明赦争看金雞立巨盤禁掖乘歡飲興濃笙歌圍繞盡芳容玉人相對賡酬勸忽奏葵花一寶鍾十花金盞勸仙娥乗興追懽酒量多燈影四圍深夜裏分明紅玉醉顔酡雜遝仙韶按八音曲餘羯鼓漸聲沉已將殊韻㕘羣奏豈貴花奴冠古今嫌羅不著索輕對面教人染褪紅衫子成來一遍出今朝看處滿園中玉鈎紅綬掛琵琶七寶輕明撥更嘉捍面折枝新御畫打絃惟恐損珍花嬪娥閒較選仙圖争到天宫意自娱掌印碧油常占得更無憂恐入酆都黄昏人寂漏初稀嬪御相從奉直歸慵困尚尋嬉戲事競將雙陸且忘機紅藥欄邊晚吹輕玉肌人醉擷芳英春衫旖旎香初散却羡東風太有情閣門雙闢約人還後苑芳菲一望間臺榭參差春更好瑶津遶岸聳眉山祕閣初生瑞竹雙碧欄杆外玉墀旁連柯並幹扶疎影帶月縈風興味長端樓遊賞正元宵珠箔低垂絢帟飄黔首康衢瞻盛際御香芬馥下雲霄閶闔朝來禁鑰開傳郵躍馬度香街封章通進言三㨗從此威風萬國懐日冷天晴近臘時玉堦金瓦雪離離浴堂門外抄名入公主宫人謝面脂九重城闕壯端門霽雪榮光瑞景分一望葱葱佳氣裏樓臺常恐碍行雲緑槐隂合正炎曦高疊盆氷匝座圍沉李浮𤓰清玉檻水晶宫殿自㤀機氷清澄瑩一屏方置近盤龍寶硯旁海玉森森紅挺秀瑣牕清楚興何長資善黌堂几席開小王初學讀書來師儒專選英豪用敎育當資保傅才雲霄高敞九城關簪佩衣裾一望間昨日閤門新入奏降王初綴紫宸班雲霄一作霽雲元宵五日宴龍樓同樂斯民一豫逰寶輦欲廻人仰望彩繩高處墮星毬杏梢梅蘂遍飄香藻荇縈紆滿碧塘嬌怯畫船推俯岸閒看風力蹙波光梅一作春七夕新秋玉露清月鈎遥掛碧雲平珍庭祈巧貪娱宴唯恨殘更促曉聲繡栭丹栱盡瑰材百歩廻廊錦帳開萬炬絳紗星粲粲拱環翠碧下樓臺禁宇春圍晝漏長睿思宸極景相望廻環露浥蒼苔合一架荼䕷滿殿香滿一作闔三月西城淑景多羽林旌斾擁鳴珂珠鞍玉鐙龍驤進寶苑珍亭喜一過亭一作庭江浙秋橙入上都深宫培植向庭除金丸磊磊尤珍異均錫臣鄰侑樂胥翠石岧嶤競巧形無雙惟是碧雲屏坤輿秀色全融結尤比三峰色更青大晟重均律吕全樂章諧協盡成編宫中嬪御皆能按欲顯儀刑内治先年年式宴集簪裳百辟班聫振鷺行曲謝臣鄰尤跂望司珍新奏玉茶牀敎化風行自掖房芸輝新繕萬書堂清閒几硯皆編帙時誦關雎正始章垂拱凌晨百辟朝鳴鞘風引徹璇霄鴛鸞雜遝趨鱗砌無限黄金重滿腰樂章重製協昇平徳冠宫闈萬古名嬪御盡能歌此曲競隨鐘鼓度新聲楊梅澤國最榮昌此嵗移來入上方造化想知偏借力結成繁實勝江鄉控馬攀鞍事打毬花袍束帶競風流盈盈巧學男兒拜惟喜先贏第一籌秋杪金柑産玉庭雲根呈瑞故連莖相期不是塵中物占得成雙雨露榮鈿筝百寶間生輝玉柱成行雁自飛對酒僊姿時一按十三絃上迸珠璣戎裘殊麗學彎弓十指纖柔力未充多被朋儕齊謔笑强顔無奈臉蓮紅花洞連延一架平文鴛雙砌接珍亭明暉北望垂楊岸滿目煙波上下青英華相背露臺高夾道雙亭氣象饒每待中秋開夕宴月輪平處奏簫韶雅樂方興大晟諧均調律吕貫三才廣庭度曲笙鏞間羽翮翺翔赴節來十里香街沸管絃金明囘馭夕陽天風輕芝葢揺霞浪裊裊龍盤七寶鞭對御分排紫錦班内家新様挽雲鬟中官宣試霓裳舞紅袖翩翩飛燕般上春精擇建溪芽攜去芸窗力鬬茶㸃處未容分品格捧甌相近比瓊花煙斂林梢掛晚虹登臨吟望興無窮秦娥越豔新糚飾小約同來寶苑中忘憂清樂在枰棊僊子精攻嵗未笄窗下每將圖局按恐防宣召較高低弱栁飄飄意甚顛無端牽住小花鈿樓中阿監遥相覷應繪闕圖供御前紫雲樓曲倚仙韶傳習皆知嵗月遥競好洮州新進譜和諧逸韻入音調杏緑桃緋一片春後庭花卉盡坤珍鞦韆峻架臨芳徑須信韶光每嵗新夏日龍池小宴開輕綃霧縠試新裁酒闌齊逐採蓮去隔浦鴛鴦箇箇猜邃宇𢎞開巧石叢擅名還有勝瀛峰巫山未足為珍異碧玉巑岏疊數重金題玉躞燦星光御札紛紛雜紫黄宣索女官三十六就中誰是校書郎燕館餘閒玉漏沉華容芳質盡知音不將簫瑟為貪靡競鼓瑶徽數弄琴澄澄方沼玉庭前天産雙英並萼蓮含秀同芳應有感故來清禁啓妖妍紋窗几硯日親臨雅玩娱情務討尋筆格硯屏皆寶製鎮書惟重馬蹏金泉源一𣲖過嚴城寶獸噴香漱玉聲分入瑤津來紫禁杯流曲沼逺相縈千歩廻廊逺接連疊山盈壁狀天然重新繪畫非塵境不是高真即列仙二浙枇杷得地榮移來丹宇倍生成天心賦與偏繁盛珍物由來出太平粉杏夭桃出苑墻隄邊楊栁拂波光梭門聳挿彤雲裏風引花毬絲縷長殿省爰新六尚名攸司遵職贊隆平屢頒衎宴豐碑立官屬同刋琬琰榮綵締鼇山聳禁街端門簾捲五雲開元宵佳景同民樂不禁人行近露臺三年禋祀敞圜壇星斗凝輝玉露寒郊外燔柴煙欲㫁禁街人已待廻鑾祐神珍觀五雲開高倚層霄疊玉臺笑語半空知逺近縱觀飛騎拂塵來禁宫春色最妖妍桃李扶疎滿眼前鬬草踏青攜伴侶更尋何處畫圖仙拂面風輕日漸長玉人初試薄羅裳斜陽樓外抛梭去兩兩三三出洞房殿庭内外錦衣重彩仗琱輿相映紅敵使未嘗經便殿始瞻儀衛懾羌戎方響新成白玉牌叩聲仍與八音諧高低二八還相映絲竹陶匏莫可偕纖眉丹臉小腰肢宜著時新窄様衣頭上宫花糚翡翠寶蟬珍蝶勢如飛窄様一作峭窄洛陽新進牡丹栽小字牌分品格來魏紫姚黄知幾許中春相繼奏花開靈犀㸃㸃透成花異域珍奇自可嘉因製芙蓉杯幾様通紋澄徹灔流霞花枝連屬勝丹青疊嶂層峰立翠屏汲引飛泉來玉甃璇題因繕迸泉亭近宻臨隄下釣鈎曲池人静不驚鷗錦鱗才得山呼進銀椀重重賜與優寶煙遥洞悉喬松團墨新翻制作功預遣丹青摹巧様百花雲影更盤龍宫人思學夀陽糚每看庭梅次第芳淺拂臙脂輕傅粉彎彎纖細黛眉長杭越奇花異果來未分流品未堪栽苑中别圃根荄潤移入珍亭一夜開主第循常賀慶來朱輪隠隱碾晴雷内東門外登車處簾合方令歩障開瑞日融和麗玉庭花枝宻處有鶯聲六宫閒燕多餘樂索寫新詩頌太平娛一作餘瑞物來呈日不虚拱禾芝草亦何殊有時宣委丹青手各使團模作畫圖萬國昇平慶有年九重榮盛百珍全民間財貨雖豐富未識新頒大觀錢洞簫聲歇酒初䦨星斗凝輝宇宙寛唯有真僊為侣伴夜深同倚玉䦨干仙韶總角籍嚴宫初學吹笙性格聰十指近纔能按字纖纖雙捧紫筠叢春暮紛紛蕩栁綿欲囘炎律困人天宫糚永晝多閒宴慣折珍珠結翠鈿宫娥相約戲鞦韆困極盈盈寶髻偏却恐逢人多謔笑暗尋香徑整花鈿碧墀十二曲闌干瓊態濃醺倚欲彈月上海棠清䕃合羅裳深夜怯輕寒池一作墀詰曲囘廊入小庭緑窗朱戸照光明宫人晝直多娱樂闔座諠譁撃馬聲金字紅牌逼夜傳指蹤韜略静戎邊往囘曾不逾旬浹巳見西隅獻凱旋殿庭親策擢羣才雜遝英賢入彀來俊敏各求先御覽禹門春浪鼓風雷羣一作英石榴繁翠漸盈枝正是清和首夏時宫女日長無一事