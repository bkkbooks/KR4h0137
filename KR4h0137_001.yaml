小松㕘怪石清嘉尤勝杏花春麗人航海覲宸都嘉奬勤勞顧遇殊幣帛從來將厚意益添異品及真珠南陽耆老賜恩榮入覲宜宣到後庭逺過期頥人仰歎龎眉清骨享安寧宫人凡百趂相貪桑葉青青貯滿籃不使朋儕知底裏宻來朱箔餵新蠶集英金屋起清秋式宴千官拜賜優宴罷瑶仙迎翠輦霞衣嬝娜逐風柔一夜濃雲布九霄忽成春色潤寒苖玉墀墀下鴛鴻到欲曉傳宣敎放朝酒闌人寂暗銀缸淡月輕風透碧窗宫女欲歌初製曲旋將絃管按新腔曉景熈熈竹影疎柔閒初理薄糚餘心情酷愛清虚樂琴阮相兼一几書金鞍寶轡簇驊騮樂奏相從共撃毬花㡌兩邊成錦陣謝恩長喜上頭籌三省居常有進呈早臨崇政接羣英太官賜食移清漏門外將交五馬聲殘臘長空欲雪天須㬰盈尺兆豐年燮調都在臣工力遣使榮頒兩府筵修竹成林碧玉攢幾枝榮茂可棲鸞瑶宫月白風清夜誰共庭除一凭欄雙鴛紋瓦碧琉璃零露瀼瀼夜未晞花外倚空成敞翼樓臺宏麗景雲飛華景紅梅兩檻分㸃成輕雪萬枝均依稀昨夜東風起巳拆香苞漏泄春霰雪飄空玉漏清月華相伴瑣窗明醇醪醟醟同歡飲旋摘詩聫賦令行清晨檐際肅霜鮮曉日初消萬瓦煙隆徳重陽開小宴競將黄菊作花鈿寶砌龍紋鑑色鮮蘭宫不信火雲天氷壺盤上排金醟枕簟餘凉好醉眠資善堂中几席開詞臣都是棟梁材專求近宻同㕘輔皇嗣初看聴讀來樂章依韻甫成編欲聴新詞禁宇傳曲裏字難相借問隨時切脚注花牋金井高梧舞戲圭露盤承潤曉淒淒深宫不是清秋景昨夜寒蛩漸漸啼蟾光秋半倍嬋娟河漢潛微瑩碧天樓上美人貪醉賞曉鐘聲斷遂經年都府新儀置六曹壯威京尹勢增豪屢空囹圄人知化典憲從中力不勞新月彎彎掛碧空嬪嬙争拜望圓穹倚闌長是躊躇久應想姮娥在桂宫翠蓮秋盛覆池塘緑柄風揺一𣲖香欲結珍苞供勝賞隨時均錫到蘭房盛一作盡龍徳營修已慶成秘扃齋潔奉三清餘田增輯成嘉致千百樓臺紺瓦明杏褪殘紅㸃碧輕融怡天氣雨初晴僊姿鬭草春園裏時聴妖嬈笑語聲初夏圓荷㸃翠錢螭頭清溜玉濺濺惜芳歸處隨雕輦半醉嬪嬙墮珥鈿歸一作處隨一作歸桃作香腮玉作膚飄飄雲縷曵衣裾婦功奇麗皆能事一種心勤是讀書清晨簾捲碧堂前淡薄梳糚結道縁漸染化風忘外欲觀聲頻送葛覃篇集英親殿䇿才豪盈廡紛紛盡雪袍禮樂問題人罕記就紆黼座繼蘭膏三五良宵皓月圓蘭缸寶炬萬家然樓臺總在氷壺裏今見蓬瀛不夜天桃葉基春二月中滿庭芽孽順年豐欲令九禁知羣卉蒙被坤輿造化工刺花彈篋紫檀弓何處星丸入苑中驚起流鶯花裏去紛紛如雨落殘紅早朝人待九門開躍馬傳呼恣往囘班列舊稱人盡曉驚聞符寶外郎來御製新規寶墨香蟠龍紋裏字成行臣鄰近宻方宣賜圓餅均盛小絳囊龍舟艤岸簇樓臺蘭棹輕飛兩翅開撃鼓鳴鐃颺旗幟早來觀賞暮方廻浴兒三日慶成均寶帶龍衣賜近臣駿馬金鞍新遴選先令羈控過延春詔令敷宣每自書朝廷遵禀不迂疎禁垣歴嵗多收得高閣珍藏倚碧虚雲母屏山翡翠簾繡衣圍住九花檐晨光旋透輕煙合寶帳蘭姿起未忺臘中僊賞起華英髙聳雲鼇徹太清預占春樓無限景更聽風度管絃聲兩行新札寄霜紈圓柄均裝七寳檀殿記宣和書四字禁中傳得作榮觀女兒糚束效男兒峭窄羅衫稱玉肌盡是珍珠勻絡縫唐巾簇帶萬花枝金波如晝麗彤庭夜寂無人傍玉寧惟有直更宫女伴呼來方得近鸞屏鳳口金爐鏤葉華高低曲折勢交加新春品制名三傑四和濃熏不足誇上元芳景自熈怡暇日因成數句詩特賜府中看不冺嬉逰均及庶民知今嵗閩中别貢茶翔龍萬壽占春芽初開寶篋新香滿分賜師垣政府家一局平分出四邊到窩仍與度關先終朝打馬為娱樂不顧頻輸萬億錢畫鷁閒登錦䌫開蘭橈飛迅水縈廻龍頭爍爍紅旗動驚起沙鷗掠岸來清和景物稱遊遨金屋亭亭瑞日高節物應時來别院合中連絡進櫻桃杏子成丹乳雀飛栁條揺曳拂漣漪瑶宫露井殘紅滿惆悵晴空欲暮時滿架荼䕷旖旎香小亭芳沼戲鴛鴦蘭房祗慕承恩澤愈學時宜百巧糚高麗新貢欲還朝再御東廻一水遥祖餞國門仍賜樂屢傳恩詔下層霄鞦韆影裏笑相迎蕙圃蘭畦恣擷英薄暮歸來春意倦芝堂閒聴碾茶聲屏山掩翠敞華堂巧燕初歸揀畫梁寂坐安閒忘俗慮益知僊府晝何長雲華重輯疊層峯寳構髙驤萃彩虹環碧對池臨翠圃一溝春水逺相通琳庭節物樂無涯又是餘寒易嵗華昨夜雪晴天氣好後園初進臘梅花璇題玉額起層樓三閣圖書集校讐近日得增新碧榜顯謨相繼繕徽猷小雨飛輕助燕泥萬花零落栁垂隄紫清宫裏人稀到廊外雙雙孔雀棲宴殿勻將蜀錦鋪花明金赫麗簪裾舞茵全似朝霞散十二金鸞面玉除每將敬愼保丕基頻嵗多男巳應期欲問榮昌待何事春中襟燕滿彤帷象榻氷盤四面涼風揺槐影蘸蓮塘玉顔一枕逰僊夢誰覺炎天畏日長日煖風和殿宇深高花修竹囀幽禽宫娥攜手臨丹檻喜看文鴛戲水心送臘自然時序應頒春常與邇遐同福隨新嵗知陽徳慶協斯男誕禁中三十六宫春信早鬱葱佳氣艷陽天莫將舊事論新事盡道今年勝去年朝來和氣巳氤氲碧瓦朱甍照眼新永晝更添蓮漏水晴曦容與蘂宫春池面氷開漾緑波枝頭花蘂蹙紅羅東風信有芳菲意應為今年樂事多蓬萊宫殿五雲低廣内樓臺草色齊憂在進賢忘寤寐曉糚常是未鳴雞梅心透粉傍瓊疏栁眼廻青裊玉除雨露不偏金穴貴六宮春曉念關雎日上觚稜氣鬱葱露華猶泠玉芙蓉錦幃繡幕風光暖瓊蘂珠花影漸重黄頭進酒鬭醇醲問有均頒不啓封向晚聞呼裝尚醖雙瓶環繞小金龍化成金碧拱彤楹四序開筵别有程安福殿階連繡帟内人常按鼓簫聲螺鈿珠璣寶盒糚琉璃瓮裏建芽香兎毫連盞烹雲液能解紅顔入醉鄉元夕風光屬太平燭龍衘耀照嚴城鼇峰屹立通明觀絳炬宵輝上下明酒入金鍾灔灔平映偷全在夾盤盛宫嬪捧勸知分别相顧潛聞笑語聲唐畫名工品格殊摉求爭進入皇居金題玉扇分倫類區别媸妍細字書翰林文府擇良工心畫諸家一一通無若孝經書座右邇英到徹畫屏風新様梳糚巧畫眉窄衣纖體最相宜一時趨向多情逸小閣幽窗静奕棋藻幄春深夜不寒蘭缸耿耿照屏彎太平絲管通宵按祥瑞封章隱几看寒食風光淑景時宫娥糚束鬭珠璣呼盧盡日隨朋侶將掩嚴閨始欲歸晝漏聲催篆縷殘碧墀幽寂畫堂寛九嬪相習敦詩訓爭把關睢諷咏看玉關馳奏捷章來鄯部洮湟萬里開閶闔通衢人意樂爭看宣舞凱歌㢠廻春日循常撃土牛香泥分去競珍收三農藉此占豐瘠應是宫娥暗有求鼎殿崇新大器安因時嚴享至誠殫零零丼露符昌福金玉霑濡拭不乾機杼年來入禁垣素絲初織未成端遍呼御府令均玩方識農家力最難錦屏誰染楚峰青依約惟無澗水聲麗質閒觀欹縷枕高唐雲杳夢難成曉色輕隂四幕低如膏小雨宻霏霏傳宣儀仗通廊立惟恐沾濡近御衣慶成宫宇亘修梁偉頌聲文出玉堂近日屢經新述作懽然中外仰宸章麻紙初新詔墨乾金蓮未剪燭花殘珠簾不隔霜華月應比人間分外寒自建中靖國二年以來至宣和六年緝熈殿所收藏御製宫詞共三百首皆在各宫今命左昭儀孔氏同嬪御章安顗等收輯類而成書頒降六宫及太子諸王宫與夫公主郡主天眷皇族之家永為珍襲宣和六年八月一日帝姬長公主書五岳山人止選一百六十七首坊刻或二百八十一首或二百九十二首或三百首或三百首有奇多混入鄙俚􅎓作以取數多既從雲間得一元本止缺二首而時本雜詩十去其半然風格己遠遜三家矣二家宫詞巻上
