body:
  text: 二家宫詞總集類提要臣等謹案二家宫詞二卷明毛晉編凡宋徽宗皇帝三百首寧宗楊皇后五十首徽宗卷末有帝姬長公主跋稱自建中靖國二年至宣和六年緝熙殿所收藏御製宫辭共三百首命左昭儀孔禎同嬪御章安愷等收緝類而成書云云考蔡京改公主為帝姬各有封號此既云帝姬又云長公主非當時之制又禎字為仁宗廟諱當時改文貞為文正改魏徵為魏證嫌名猶避之甚嚴豈有宫中昭儀敢以此字為名者此跋殆出於依托楊后卷末有潛夫跋不著名字毛晉謂不知何許人考劉克莊字潛夫跋稱癸酉仲春為度宗咸淳九年時代亦合或克莊所題耶毛晉跋徽宗卷末稱坊刻或二百八十首或二百九十二首或三百首或三百首有奇多混入鄙俚􅎓作後從雲間得一元本止缺二首則其書已屢經竄亂即所謂雲間元本亦未必舊觀義跋楊后卷末稱今本止三十首餘二十首從未之見乃天啓丁卯得胡應麟家祕本所載又稱迎春燕子尾纖纖一首落絮濛濛立夏天一首紫禁仙輿詰旦來一首向刻唐人蘭徑香消玉輦蹤一首缺月流光入綺疏一首輦路青苔雨後深一首向刻元人今姑仍原本云云今考集中阿姊攜儂近紫微蕊宫承寵鬬芳菲繡幃獨自裁新錦怕看花間蝴蝶飛一首亦似楊妹子作故有首句書史㑹要稱楊妹子詩語關情思人或譏之蓋即此類不應出楊后之筆疑此三百五十首者皆後人裒輯得之真僞參半不盡可憑姑以流傳己久存之耳乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b6010c070e5eef88de57b09734bfe65ff0479dfa9e5d5de8f324cf9e2a4a76de
