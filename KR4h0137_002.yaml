front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0137_WYG_002-1a, image: WYG1416/WYG1416-0710c.png}
body:
  text: 二家宫詞卷下明毛晉編宋楊太后瑞日曈曨散曉紅乾元萬國珮丁東紫宸北使班才退百辟同趨德壽宫元宵時雨賞宫梅恭請光堯壽聖來醉裏君王扶上輦鑾輿半仗點燈回栁枝挾雨渥新緑桃蕊含風破小紅天上春光偏得早嵳峩宫殿五雲中春風淡淡水淙淙携伴尋芳過小杠惱殺野塘間送目鴛鴦無數各雙雙溶溶太液碧波翻雲外樓臺日月間春到漢宫三十六為分和氣到人間曉窗生白已鶯啼啼在宫花第幾枝煙斷獸爐香未絶曲房朱戶夢回時剪剪輕風二月天栁絲飄揚倍堪憐靜憑雕檻渾無事細數穿花燕影偏一簾小雨怯春寒禁禦深沉白晝間滿地落花紅不掃黃鸝枝上語綿蠻上林花木正芳菲內裏爭傳御製詞春賦新翻入宫調美人羣唱捧瑶巵海棠花裏奏琵琶沉碧池邊醉九霞禁籞融融春日靜五雲深護帝王家後院深沉景物幽竒花名竹弄春柔翠華經嵗無逰幸多少亭臺廢不修天申聖莭禮非常躬率羣臣上夀觴天子捧盤仍再拜侍中宣達近龍牀水殿鈎簾四靣風荷花簇錦照人紅吾王一曲薰絃罷萬俗泠泠解愠中繞堤翠栁忘憂草夾岸紅葵安石榴御水一溝清徹底晚涼時泛小龍舟薰風宫殿日長時靜運天機一局棋國手人人饒處著須知聖算出新奇宫殿鈎簾看水晶時當三伏熾炎蒸翰林學士知誰直今日傳宣與賜氷雲影低涵柏子池秋聲輕度萬年枝要知玉宇涼多少正在觀書一夜時瑣窗宫漏滴銅壺午夢驚回落井梧風遞樂聲來玉宇日移花影上金鋪銀燭瑶觥競上元良宵午月正當軒棚頭忽喚歌新曲宛轉餘音出紫垣迎春燕子尾纖纖拂栁穿花掠翠簷聞道蘂宫三十六美人爭為捲珠簾落絮濛濛立夏天樓前槐樹影初圓傳聞紫殿深深處别有薰風入舜絃紫禁仙輿詰旦來旌旗遙倚望春臺不知庭霰今朝下疑是林花昨夜開涼生水殿樂宸逰釣得金鱗上御鈎聖德至仁元不殺指揮皆放小池頭涼秋結束鬬新晴宣入毬場尚未明一朵紅雲黃蓋底千官下馬起居聲秋高風動角弓鳴臂健常嫌斗力輕玉陛才傳看御箭中心雙中謝恩聲思賢夢寢過商宗右武崇儒治道隆總攬權綱求治理羣臣臧否疏屏風用人論理見宸衷賞罰刑威合至公天下監司二千石姓名都在御屏中家傳筆法學光堯聖草真行説兩朝天縱自然成一體漫誇虎步與龍跳泛索坤寧一日羊自從正位控辭章好生躬儉趨千古風化宫嬪只淡糚蘭徑香銷玉輦蹤梨花不肯負春風緑窗深鎖無人見自碾硃砂養守宫缺月流光入綺疏金壷傳箭夢回初秦臺綵鳳無消息桂影空間十二除輦路青苔雨後深銅魚雙鑰晝沉沉詞臣還有相如在不得當時買賦金擊鞠由來豈作嬉不忘鞍馬是神機牽韁絶尾施新巧背打星毬一點飛黃鳥驚眠曙色開慵梳鬟髻意徘徊君王早御延英殿頻喚宫人上直來宫槐映日翠隂濃薄暑應難到九重節近賜衣爭試巧彩絲新樣起盤龍角黍氷盤餖飣裝酒闌昌歜泛瑶觴近臣誇賜金書扇御侍爭傳佩帶香忽地君王喜氣濃秋千高挂百花叢阿誰能逞翻飛態便得稱能女隊中新翻歌譜甚能奇宣索宫娥入管吹按拍未諧爭共笑含羞無語自凝思一朵榴花插鬢鴉君王長得笑時誇內家衫子新番出淺色新裁艾虎紗夭桃稚栁恣春妍鎮日呼羣嬉水邊忽地上棚宣進入祗承未慣怕爭前簾幕深深四面垂清和天氣漏聲遲宫中閣裏催繅繭要趂新蠶作五絲嵗嵗親蠶麥熟時密令中使視郊圻歸來奏罷天顔悅喜阜吾民鼓玉徽內園昨夜報花開中外喧傳玉輦來遙望紅糚撩亂處人人爭獻萬年杯阿姊攜儂近紫薇蕊宫承寵鬬芳菲繡幃獨自裁新錦怕見花間雙蝶飛好花開遍玉欄杆挈伴拖橈淺水灘但笑紅霞映池面不知嬌面早先丹小小宫娥近水居雕楣繡額映清渠忽然攜伴憑低檻好是雙蓮出水初日日尋春不見春弓鞋踏破小除藝棚頭宣入紅糚隊春在金樽已十分海棠移向小窗栽高疊盆山合復開將見紅葩鬬新艷君王應為探花來遙夜焚香禮玉真桂花叢裏展文茵長空月浸星河影鸚鵡驚寒頻喚人小樣龍盤集翠毬金羈緩控五花騮繡旗高處鈞天奏御捧先過第一籌右宫詞五十首寧宗楊后所撰好事者祕而不傳世亦罕見癸酉仲春得之江左何啻和隋之珠璧耶王建花蕊不得專美矣濳夫識丁卯花朝一友密緘逺寄云是少室山人手訂祕本即命豫附鐫花蕊後以成宫詞快觀因檢宋徽宗三百首合梓二家宫詞以公同好考今本止三十首餘草首從未之見但迎春燕子尾纖纖落絮濛濛立夏天紫禁仙輿詰旦來向刻唐人又蘭徑香銷玉輦蹤缺月流光入綺疏輦路青苔雨後深向刻元人今姑仍原本未便刪去舊跋潛夫不知何許人也二家宫詞卷下
